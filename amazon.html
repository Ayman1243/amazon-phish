<!DOCTYPE html>

        body { background: #EAEDED; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Arial, sans-serif; margin: 0; padding: 20px; }

        .g-recaptcha { margin: 20px auto; display: inline-block; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; }
        button:hover { background: #0056b3; }
        button:disabled { background: #cccccc; color: #666666; cursor: not-allowed; }
        .spinner { width: 40px; height: 40px; border: 3px solid #e0e0e0; border-top: 3px solid #FF9900; border-radius: 50%; animation: spin 0.6s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #status { display: none; margin-bottom: 15px; font-weight: bold; color: #555; }
        
        /* إخفاء تنبيه التجربة من جوجل */
        .g-recaptcha + br + div, .g-recaptcha ~ div[style*="color: red"] { display: none !important; }
    </style>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>

<div id="gate">
    <div id="status"></div>
